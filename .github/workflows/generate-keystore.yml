name: Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate_keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore fintrack-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias fintrack -storepass fintrack2026 -keypass fintrack2026 -dname "CN=FinTrack, OU=Dev, O=FinTrack, L=KL, ST=KL, C=MY"
          
      - name: Get SHA-1 Fingerprint
        run: |
          echo "SHA-1 FINGERPRINT:"
          keytool -list -v -keystore fintrack-release.jks -alias fintrack -storepass fintrack2026 -keypass fintrack2026 | grep SHA1:
          
      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-release-keystore
          path: fintrack-release.jks
